name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          shellcheck -s bash -S warning -x lib/common.sh
          shellcheck -s bash -S warning -x lib/merge-memory.sh
          shellcheck -s bash -S warning -x setup.sh
          shellcheck -s bash -S warning -x sync.sh
          shellcheck -s bash -S warning -x uninstall.sh
          shellcheck -s bash -S warning -x hooks/memory-sync.sh
