# Claude Memory Sync Configuration
# Copy to config.yaml and edit to match your setup.
# This file is git-ignored — safe to put real values in config.yaml.

hub:
  host: 192.168.1.100         # IP or hostname of the bare repo server
  fallback_host:               # (optional) LAN IP to try when primary host is unreachable
                               # e.g. if host is a Tailscale hostname, set fallback_host to the LAN IP
                               # so sync works both remotely (Tailscale) and locally (LAN)
  user: username               # SSH username on the hub machine
  bare_repo: ~/git/claude-memory.git  # Path to bare repo on hub

ssh:
  key: ~/.ssh/id_ed25519      # SSH private key path
  timeout: 3                   # Connection timeout in seconds

sync:
  local_repo: ~/dev/claude-memory    # Local working repo (clone of bare repo)
  # memory_dir is auto-detected: ~/.claude/projects/-Users-$(whoami)/memory
  # Override only if your Claude Code memory is in a non-standard location:
  # memory_dir: ~/.claude/projects/-Users-myuser/memory
